<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | A.K Mutua & Co</title>
<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  * {
    box-sizing: border-box;
  }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f4f6f8;
    margin: 0;
    padding: 0;
  }
  header {
    background: #0a2463;
    color: #fff;
    padding: 15px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }
  header h2 { margin: 0; font-size: 1.4rem; }
  header .btns button {
    background: #073366;
    color: #fff;
    border: none;
    padding: 8px 15px;
    border-radius: 5px;
    cursor: pointer;
    margin-left: 10px;
    transition: background 0.2s;
  }
  header .btns button:hover { background: #051f4d; }
  .container { max-width: 1400px; margin: 20px auto; padding: 0 20px; }
  .section {
    background: #fff;
    padding: 20px;
    margin-bottom: 30px;
    border-radius: 10px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.08);
  }
  .section h3 {
    color: #0a2463;
    margin-top: 0;
    margin-bottom: 15px;
    border-left: 5px solid #0a2463;
    padding-left: 15px;
  }
  .form-group {
    margin-bottom: 15px;
  }
  .form-group input,
  .form-group textarea,
  .form-group select {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
    font-size: 14px;
  }
  .form-group textarea {
    resize: vertical;
    min-height: 80px;
  }
  button.action-btn {
    background: #0a2463;
    color: #fff;
    border: none;
    padding: 10px 20px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
  }
  button.action-btn:hover { background: #073366; }
  button.small-btn {
    background: #2c3e50;
    padding: 5px 10px;
    font-size: 12px;
    margin: 0 2px;
  }
  button.danger { background: #c0392b; }
  button.danger:hover { background: #a82316; }
  button.success { background: #27ae60; }
  button.success:hover { background: #1e8449; }

  /* Filters & sorting bar */
  .controls-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 15px;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .search-box {
    flex: 2;
    min-width: 200px;
    display: flex;
    gap: 10px;
  }
  .search-box input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 5px;
  }
  .sort-buttons {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .sort-buttons button {
    background: #ecf0f1;
    color: #2c3e50;
    border: none;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
  }
  .sort-buttons button.active {
    background: #0a2463;
    color: white;
  }
  .reset-btn {
    background: #95a5a6 !important;
    color: white !important;
  }
  .reset-btn:hover {
    background: #7f8c8d !important;
  }

  /* Table */
  .table-wrapper {
    overflow-x: auto;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  table th, table td {
    border: 1px solid #ddd;
    padding: 12px 8px;
    text-align: left;
    vertical-align: top;
  }
  table th {
    background: #0a2463;
    color: #fff;
    font-weight: 600;
  }
  table td {
    word-break: break-word;
    white-space: normal;
  }
  /* Prevent overflow for phone and case number */
  td:nth-child(2), td:nth-child(4) {
    white-space: nowrap;
  }
  @media (max-width: 768px) {
    td:nth-child(2), td:nth-child(4) {
      white-space: normal;
    }
  }
  .status-badge {
    display: inline-block;
    padding: 4px 8px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: bold;
    text-align: center;
    min-width: 70px;
  }
  .status-pending {
    background: #f39c12;
    color: #fff;
  }
  .status-closed {
    background: #2ecc71;
    color: #fff;
  }
  .action-icons i {
    cursor: pointer;
    margin: 0 5px;
    font-size: 1.1rem;
    transition: color 0.2s;
  }
  .action-icons i.fa-edit { color: #3498db; }
  .action-icons i.fa-trash-alt { color: #e74c3c; }
  .action-icons i:hover { opacity: 0.7; }

  /* Pagination */
  .pagination {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .pagination button {
    background: #ecf0f1;
    border: none;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 14px;
  }
  .pagination button.active {
    background: #0a2463;
    color: white;
  }
  .pagination button:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* Modal */
  .modal {
    display: none;
    position: fixed;
    z-index: 1000;
    left: 0;
    top: 0;
    width: 100%;
    height: 100%;
    overflow: auto;
    background-color: rgba(0,0,0,0.4);
  }
  .modal-content {
    background-color: #fefefe;
    margin: 5% auto;
    padding: 20px;
    border-radius: 10px;
    width: 90%;
    max-width: 500px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }
  .modal-content h3 {
    margin-top: 0;
  }
  .modal-buttons {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 20px;
  }
  .close {
    float: right;
    font-size: 28px;
    font-weight: bold;
    cursor: pointer;
  }
  .close:hover { color: #0a2463; }
</style>
</head>
<body>

<script>
if (!localStorage.getItem('adminAuth')) {
  window.location.href = 'login.html';
}
</script>

<header>
  <h2><i class="fas fa-user-shield"></i> Admin Dashboard</h2>
  <div class="btns">
    <button onclick="window.location.href='index.html'"><i class="fas fa-home"></i> Home</button>
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</header>

<div class="container">

  <!-- Add Client Section -->
  <div class="section">
    <h3>Add New Client</h3>
    <div class="form-group">
      <input type="text" id="name" placeholder="Client Name">
      <input type="text" id="caseNumber" placeholder="Case Number (e.g., AKM-001-2023)">
      <textarea id="caseDescription" placeholder="Case Description"></textarea>
      <input type="text" id="phone" placeholder="Phone Number">
      <input type="email" id="email" placeholder="Email Address (optional)">
    </div>
    <button class="action-btn" onclick="addClient()"><i class="fas fa-plus"></i> Add Client</button>
  </div>

  <!-- Clients List Section -->
  <div class="section">
    <h3>Clients List</h3>

    <!-- Controls -->
    <div class="controls-bar">
      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search by name or case number...">
        <button class="action-btn reset-btn" onclick="resetFilters()"><i class="fas fa-undo-alt"></i> Reset Filters</button>
      </div>
      <div class="sort-buttons">
        <button id="sortNewest" onclick="sortBy('newest')">Newest First</button>
        <button id="sortOldest" onclick="sortBy('oldest')">Oldest First</button>
        <button id="sortPending" onclick="sortBy('pending')">Pending</button>
        <button id="sortClosed" onclick="sortBy('closed')">Closed</button>
      </div>
    </div>

    <div class="table-wrapper">
      <table id="clientsTable">
        <thead>
          <tr>
            <th>Name</th>
            <th>Case Number</th>
            <th>Description</th>
            <th>Phone</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="clientsTableBody">
          <tr><td colspan="6" style="text-align:center;">Loading clients...</td></tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div class="pagination" id="paginationControls"></div>
  </div>
</div>

<!-- Edit Modal -->
<div id="editModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeEditModal()">&times;</span>
    <h3>Edit Client</h3>
    <input type="hidden" id="editId">
    <div class="form-group">
      <label>Name</label>
      <input type="text" id="editName">
    </div>
    <div class="form-group">
      <label>Case Number</label>
      <input type="text" id="editCaseNumber">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="editDescription" rows="3"></textarea>
    </div>
    <div class="form-group">
      <label>Phone</label>
      <input type="text" id="editPhone">
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" id="editEmail">
    </div>
    <div class="form-group">
      <label>Status</label>
      <select id="editStatus">
        <option value="pending">Pending</option>
        <option value="closed">Closed</option>
      </select>
    </div>
    <div class="modal-buttons">
      <button class="action-btn" onclick="updateClient()">Save Changes</button>
      <button class="action-btn danger" onclick="closeEditModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://ak-mutua-law.onrender.com'; // Change to your backend URL

// Global data
let allClients = [];
let currentSort = 'newest'; // default sort on load
let currentSearch = '';
let currentPage = 1;
const rowsPerPage = 10;

// Helper: extract year from case number (format AKM-XXX-YYYY)
function extractYear(caseNumber) {
  const parts = caseNumber.split('-');
  if (parts.length === 3) return parseInt(parts[2], 10);
  return 0;
}

// Sort functions
function sortClients(clients, sortType) {
  let sorted = [...clients];
  switch(sortType) {
    case 'newest':
      sorted.sort((a,b) => extractYear(b.caseNumber) - extractYear(a.caseNumber));
      break;
    case 'oldest':
      sorted.sort((a,b) => extractYear(a.caseNumber) - extractYear(b.caseNumber));
      break;
    case 'pending':
      sorted = sorted.filter(c => c.status === 'pending');
      break;
    case 'closed':
      sorted = sorted.filter(c => c.status === 'closed');
      break;
    default:
      break;
  }
  return sorted;
}

// Apply filters (search + sort)
function getFilteredClients() {
  let filtered = allClients;
  if (currentSearch.trim() !== '') {
    const q = currentSearch.toLowerCase();
    filtered = filtered.filter(c => 
      c.name.toLowerCase().includes(q) || 
      c.caseNumber.toLowerCase().includes(q)
    );
  }
  return sortClients(filtered, currentSort);
}

// Render table with pagination
function renderTable() {
  const filtered = getFilteredClients();
  const totalPages = Math.ceil(filtered.length / rowsPerPage);
  if (currentPage > totalPages) currentPage = totalPages || 1;
  const start = (currentPage - 1) * rowsPerPage;
  const pageClients = filtered.slice(start, start + rowsPerPage);
  const tbody = document.getElementById('clientsTableBody');
  if (pageClients.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No clients found</td></tr>';
  } else {
    tbody.innerHTML = pageClients.map(c => `
      <tr>
        <td>${escapeHtml(c.name)}</td>
        <td>${escapeHtml(c.caseNumber)}</td>
        <td>${escapeHtml(c.caseDescription || '')}</td>
        <td>${escapeHtml(c.phone)}</td>
        <td><span class="status-badge ${c.status === 'pending' ? 'status-pending' : 'status-closed'}">${c.status === 'pending' ? 'Pending' : 'Closed'}</span></td>
        <td class="action-icons">
          <i class="fas fa-edit" onclick="openEditModal('${c._id}')" title="Edit"></i>
          <i class="fas fa-trash-alt" onclick="deleteClient('${c._id}')" title="Delete"></i>
        </td>
      </tr>
    `).join('');
  }
  renderPagination(totalPages);
}

function renderPagination(totalPages) {
  const paginationDiv = document.getElementById('paginationControls');
  if (totalPages <= 1) {
    paginationDiv.innerHTML = '';
    return;
  }
  let html = `<button onclick="changePage(1)" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-angle-double-left"></i></button>
              <button onclick="changePage(${currentPage-1})" ${currentPage === 1 ? 'disabled' : ''}><i class="fas fa-angle-left"></i></button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i === 1 || i === totalPages || (i >= currentPage-2 && i <= currentPage+2)) {
      html += `<button onclick="changePage(${i})" class="${i === currentPage ? 'active' : ''}">${i}</button>`;
    } else if (i === currentPage-3 || i === currentPage+3) {
      html += `<button disabled>...</button>`;
    }
  }
  html += `<button onclick="changePage(${currentPage+1})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-angle-right"></i></button>
           <button onclick="changePage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}><i class="fas fa-angle-double-right"></i></button>`;
  paginationDiv.innerHTML = html;
}

function changePage(page) {
  currentPage = page;
  renderTable();
}

function applyFilters() {
  currentSearch = document.getElementById('searchInput').value;
  currentPage = 1;
  renderTable();
}

function sortBy(type) {
  currentSort = type;
  currentPage = 1;
  // Highlight active sort button
  document.querySelectorAll('.sort-buttons button').forEach(btn => btn.classList.remove('active'));
  if (type === 'newest') document.getElementById('sortNewest').classList.add('active');
  else if (type === 'oldest') document.getElementById('sortOldest').classList.add('active');
  else if (type === 'pending') document.getElementById('sortPending').classList.add('active');
  else if (type === 'closed') document.getElementById('sortClosed').classList.add('active');
  renderTable();
}

// Reset all filters to default (newest, no search, page 1)
function resetFilters() {
  document.getElementById('searchInput').value = '';
  currentSearch = '';
  currentSort = 'newest';
  currentPage = 1;
  // Update active sort button
  document.querySelectorAll('.sort-buttons button').forEach(btn => btn.classList.remove('active'));
  document.getElementById('sortNewest').classList.add('active');
  renderTable();
}

// Helper to escape HTML
function escapeHtml(str) {
  if (!str) return '';
  return str.replace(/[&<>]/g, function(m) {
    if (m === '&') return '&amp;';
    if (m === '<') return '&lt;';
    if (m === '>') return '&gt;';
    return m;
  }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
    return c;
  });
}

// Fetch all clients from backend
async function fetchClients() {
  try {
    const res = await fetch(`${API_URL}/clients`, {
      headers: { 'x-admin-password': '#Akmutuaadv@2013' }
    });
    if (!res.ok) throw new Error('Failed to fetch');
    allClients = await res.json();
    // After loading data, reset to default view (newest, no search)
    resetFilters();
  } catch (err) {
    console.error('Error fetching clients:', err);
    document.getElementById('clientsTableBody').innerHTML = '<tr><td colspan="6" style="text-align:center;">Error loading data. Please refresh.</td></tr>';
  }
}

// Add client
async function addClient() {
  const name = document.getElementById('name').value.trim();
  const caseNumber = document.getElementById('caseNumber').value.trim();
  const caseDescription = document.getElementById('caseDescription').value.trim();
  const phone = document.getElementById('phone').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!name || !caseNumber || !phone) {
    alert('Please fill in name, case number, and phone.');
    return;
  }

  try {
    const res = await fetch(`${API_URL}/clients`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': '#Akmutuaadv@2013'
      },
      body: JSON.stringify({ name, caseNumber, caseDescription, phone, email })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.message || 'Error adding client');
    alert(data.message || 'Client added');
    // Clear form
    document.getElementById('name').value = '';
    document.getElementById('caseNumber').value = '';
    document.getElementById('caseDescription').value = '';
    document.getElementById('phone').value = '';
    document.getElementById('email').value = '';
    await fetchClients(); // refresh (will also reset filters)
  } catch (error) {
    console.error('Error adding client:', error);
    alert('Failed to add client.');
  }
}

// Delete client
async function deleteClient(id) {
  if (!confirm('Are you sure you want to delete this client?')) return;
  try {
    const res = await fetch(`${API_URL}/clients/${id}`, {
      method: 'DELETE',
      headers: { 'x-admin-password': '#Akmutuaadv@2013' }
    });
    if (!res.ok) throw new Error('Delete failed');
    alert('Client deleted');
    await fetchClients(); // refresh
  } catch (err) {
    console.error('Delete error:', err);
    alert('Failed to delete client.');
  }
}

// Edit modal
let currentEditId = null;
function openEditModal(id) {
  const client = allClients.find(c => c._id === id);
  if (!client) return;
  currentEditId = id;
  document.getElementById('editId').value = id;
  document.getElementById('editName').value = client.name;
  document.getElementById('editCaseNumber').value = client.caseNumber;
  document.getElementById('editDescription').value = client.caseDescription || '';
  document.getElementById('editPhone').value = client.phone;
  document.getElementById('editEmail').value = client.email || '';
  document.getElementById('editStatus').value = client.status || 'pending';
  document.getElementById('editModal').style.display = 'block';
}

function closeEditModal() {
  document.getElementById('editModal').style.display = 'none';
  currentEditId = null;
}

async function updateClient() {
  const id = currentEditId;
  const updatedData = {
    name: document.getElementById('editName').value.trim(),
    caseNumber: document.getElementById('editCaseNumber').value.trim(),
    caseDescription: document.getElementById('editDescription').value.trim(),
    phone: document.getElementById('editPhone').value.trim(),
    email: document.getElementById('editEmail').value.trim(),
    status: document.getElementById('editStatus').value
  };
  if (!updatedData.name || !updatedData.caseNumber || !updatedData.phone) {
    alert('Name, case number, and phone are required.');
    return;
  }
  try {
    const res = await fetch(`${API_URL}/clients/${id}`, {
      method: 'PUT',
      headers: {
        'Content-Type': 'application/json',
        'x-admin-password': '#Akmutuaadv@2013'
      },
      body: JSON.stringify(updatedData)
    });
    if (!res.ok) throw new Error('Update failed');
    alert('Client updated');
    closeEditModal();
    await fetchClients(); // refresh
  } catch (err) {
    console.error('Update error:', err);
    alert('Failed to update client.');
  }
}

// Logout
function logout() {
  localStorage.removeItem('adminAuth');
  window.location.href = 'login.html';
}

// Initial load
fetchClients();

// Event listener for search input
document.getElementById('searchInput').addEventListener('input', applyFilters);
</script>
</body>
</html>
